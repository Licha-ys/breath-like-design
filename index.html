    <title>像呼吸一样</title>

  <body>
    <div id="root">
      <main style="min-height:100vh;display:flex;align-items:center;padding:48px;background:#F6F3EC;color:#2F2F2B;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <section style="max-width:960px;margin:0 auto;width:100%;">
          <p style="color:#77736A;letter-spacing:.28em;text-transform:uppercase;font-size:12px;margin:0 0 24px;">Naoto Fukasawa / Without Thought</p>
          <h1 style="font-size:clamp(56px,10vw,128px);line-height:1;font-weight:200;margin:0;">像呼吸一样</h1>
          <p style="margin:32px 0 0;color:#77736A;font-size:20px;line-height:1.8;">深泽直人的无意识设计与东方调和</p>
          <svg style="margin-top:56px;width:100%;height:120px;" viewBox="0 0 720 120" aria-hidden="true">
            <path d="M24 60 C96 42 146 42 214 60 C282 78 326 78 388 60 C450 42 504 42 574 60 C630 74 670 74 696 60" fill="none" stroke="#9D6B5C" stroke-width="1.4" stroke-linecap="round" />
          </svg>
          <p style="margin:32px 0 0;color:#77736A;font-size:16px;line-height:2;">好的设计不需要被注意。它像空气、光、水和呼吸一样，自然地进入日常。</p>
        </section>
      </main>
